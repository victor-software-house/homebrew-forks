name: Update tmux formula

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check latest jixiuf/tmux commit
        id: upstream
        run: |
          COMMIT=$(curl -sf https://api.github.com/repos/jixiuf/tmux/commits/master | jq -r .sha)
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

      - name: Read current pinned commit
        id: current
        run: |
          CURRENT=$(grep -oP '(?<=/archive/)[0-9a-f]{40}(?=\.tar\.gz)' Formula/tmux.rb)
          echo "commit=$CURRENT" >> $GITHUB_OUTPUT

      - name: Update formula if commit changed
        if: steps.upstream.outputs.commit != steps.current.outputs.commit
        env:
          COMMIT: ${{ steps.upstream.outputs.commit }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT=${COMMIT:0:7}
          URL="https://github.com/jixiuf/tmux/archive/${COMMIT}.tar.gz"

          curl -sL -o /tmp/tmux-src.tar.gz "$URL"
          SHA256=$(sha256sum /tmp/tmux-src.tar.gz | awk '{print $1}')

          # Bump version string to next-3.7-<short sha>
          sed -i "s|/archive/[0-9a-f]\{40\}\.tar\.gz|/archive/${COMMIT}.tar.gz|" Formula/tmux.rb
          sed -i "s|version \".*\"|version \"next-3.7-${SHORT}\"|" Formula/tmux.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/tmux.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tmux.rb
          git commit -m "tmux: bump to ${SHORT}"
          git push
